<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada — IAtoca</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0F0F1A;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .container { max-width: 500px; }
        h1 { font-size: 6rem; font-weight: 800; background: linear-gradient(135deg, #00D4AA, #8B5CF6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 1rem; }
        h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem; }
        p { color: #B0B0C8; font-size: 1rem; line-height: 1.7; margin-bottom: 2rem; }
        a.btn { display: inline-block; padding: 0.9rem 2rem; background: #6C3CE1; color: #fff; text-decoration: none; border-radius: 12px; font-weight: 600; transition: all 0.3s; }
        a.btn:hover { background: #8B5CF6; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Esta página no existe</h2>
        <p>Puede que la URL haya cambiado o que la página haya sido eliminada. Pero no te preocupes, la IA aún no ha roto internet.</p>
        <a href="/" class="btn">Volver al inicio →</a>
    </div>
</body>
</html>
